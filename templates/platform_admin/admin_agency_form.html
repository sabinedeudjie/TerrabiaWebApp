{% extends 'base.html' %}

{% block title %}Create Agency - Terrabia{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;">Create Delivery Agency</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="name">Agency Name</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email (for login credentials)</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="address">Address</label>
                <textarea id="address" name="address" class="form-control" rows="2" placeholder="Agency address (optional)"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="coverage_area">Zone de Couverture <span style="color: red;">*</span></label>
                <select id="coverage_area" name="coverage_area" class="form-control" required>
                    <option value="">Sélectionnez une zone</option>
                    {% for area in coverage_areas %}
                        <option value="{{ area.id }}">{{ area.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="license_number">License Number</label>
                <input type="text" id="license_number" name="license_number" class="form-control" required>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">Create Agency</button>
                <a href="{% url 'platform_admin:agencies' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
