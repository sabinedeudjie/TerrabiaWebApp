{% extends 'base.html' %}

{% block title %}Edit Profile - Terrabia{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;">Edit Profile</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="agency_name">Agency Name</label>
                <input type="text" id="agency_name" name="agency_name" class="form-control" value="{{ agency.agency_name }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ agency.email }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone_number">Phone Number</label>
                <input type="tel" id="phone_number" name="phone_number" class="form-control" value="{{ agency.phone_number|default:'' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="address">Address</label>
                <textarea id="address" name="address" class="form-control" rows="2" placeholder="Agency address">{{ agency.address|default:'' }}</textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="coverage_area">Coverage Area</label>
                <select id="coverage_area" name="coverage_area" class="form-control">
                    <option value="">Select a coverage area</option>
                    {% for area in coverage_areas %}
                        <option value="{{ area.id }}" {% if agency.coverage_area and agency.coverage_area.id == area.id %}selected{% endif %}>
                            {{ area.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="license_number">License Number</label>
                <input type="text" id="license_number" name="license_number" class="form-control" value="{{ agency.license_number }}" required>
            </div>
            
            <div style="margin-bottom: 1rem; padding: 0.75rem; background: rgba(255, 152, 0, 0.1); border-radius: 4px; font-size: 0.875rem; border: 1px solid rgba(255, 152, 0, 0.3); color: #FF9800;">
                <strong>Status:</strong> {{ agency.get_status_display }}<br>
                <small>Status can only be changed by platform administrators.</small>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'agency:profile' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
