{% extends 'base.html' %}

{% block title %}Sign In - Terrabia{% endblock %}

{% load static %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{% static 'images/logo.png' %}" alt="Terrabia Logo" style="height: 80px; width: auto; margin-bottom: 1rem;">
        </div>
        <h2 style="text-align: center; margin-bottom: 2rem;">Sign In</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Don't have an account? <a href="{% url 'accounts:join' %}">Get Started</a>
        </p>
    </div>
</div>
{% endblock %}
