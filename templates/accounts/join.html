{% extends 'base.html' %}

{% block title %}Join Terrabia{% endblock %}

{% load static %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{% static 'images/logo.png' %}" alt="Terrabia Logo" style="height: 80px; width: auto; margin-bottom: 1rem;">
        </div>
        <h2 style="text-align: center; margin-bottom: 2rem;">Join Terrabia</h2>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">
            Choose your role to get started
        </p>
        
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a href="{% url 'accounts:register_customer' %}" class="btn btn-primary" style="padding: 1.5rem; text-align: center; font-size: 1.125rem;">
                I am a Customer
            </a>
            <a href="{% url 'accounts:register_farmer' %}" class="btn btn-secondary" style="padding: 1.5rem; text-align: center; font-size: 1.125rem;">
                I am a Farmer
            </a>
        </div>
        
        <p style="text-align: center; margin-top: 2rem;">
            Already have an account? <a href="{% url 'accounts:login' %}">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
