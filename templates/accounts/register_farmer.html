{% extends 'base.html' %}

{% block title %}Register as Farmer - Terrabia{% endblock %}

{% load static %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{% static 'images/logo.png' %}" alt="Terrabia Logo" style="height: 70px; width: auto; margin-bottom: 1rem;">
        </div>
        <h2 style="text-align: center; margin-bottom: 2rem;">Register as Farmer</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="farm_name">Farm Name</label>
                <input type="text" id="farm_name" name="farm_name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="contact_person">Contact Person Name</label>
                <input type="text" id="contact_person" name="contact_person" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="zone">Zone <span style="color: red;">*</span></label>
                <select id="zone" name="zone" class="form-control" required onchange="loadStreets(this.value)">
                    <option value="">Select a zone</option>
                    {% for area in coverage_areas %}
                        <option value="{{ area.id }}">{{ area.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="street">Street/Quartier <span style="color: red;">*</span></label>
                <select id="street" name="street" class="form-control" required>
                    <option value="">Select a zone first</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="address_details">Détails de l'adresse de la ferme</label>
                <textarea id="address_details" name="address_details" class="form-control" rows="2" placeholder="Localisation précise de la ferme (optionnel)"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="{% url 'accounts:login' %}">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Load streets when zone is selected
function loadStreets(zoneId) {
    const streetSelect = document.getElementById('street');
    if (!streetSelect) return;
    
    streetSelect.innerHTML = '<option value="">Loading...</option>';
    
    if (!zoneId) {
        streetSelect.innerHTML = '<option value="">Select a zone first</option>';
        return;
    }
    
    fetch(`/api/locations/streets/?coverage_area=${zoneId}`)
        .then(response => response.json())
        .then(data => {
            streetSelect.innerHTML = '<option value="">Select a street</option>';
            if (data.streets) {
                data.streets.forEach(street => {
                    const option = document.createElement('option');
                    option.value = street.id;
                    option.textContent = street.name;
                    streetSelect.appendChild(option);
                });
            }
        })
        .catch(error => {
            console.error('Error loading streets:', error);
            streetSelect.innerHTML = '<option value="">Error loading</option>';
        });
}
</script>
{% endblock %}
